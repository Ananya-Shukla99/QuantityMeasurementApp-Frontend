<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quantity Measurement — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
   <link rel="stylesheet" href="../css/home.css" />
</head>
<body>

<header>
  <h1>⚖️ Quantity Measurement</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="welcomeMsg" style="font-size:.88rem;opacity:.85;"></span>
    <button class="logout-btn" onclick="logout()">← Logout</button>
  </div>
</header>

<main>
  <div class="card">

    <!-- TYPE SELECTOR -->
    <div class="section-label">Choose Type</div>
    <div class="type-grid">
      <button class="type-btn active" data-type="length" onclick="setType('length',this)">
        <span class="icon">📏</span><span class="label">Length</span>
      </button>
      <button class="type-btn" data-type="weight" onclick="setType('weight',this)">
        <span class="icon">⚖️</span><span class="label">Weight</span>
      </button>
      <button class="type-btn" data-type="temperature" onclick="setType('temperature',this)">
        <span class="icon">🌡️</span><span class="label">Temperature</span>
      </button>
      <button class="type-btn" data-type="volume" onclick="setType('volume',this)">
        <span class="icon">🧪</span><span class="label">Volume</span>
      </button>
    </div>

    <!-- ACTION TABS -->
    <div class="section-label">Choose Action</div>
    <div class="action-tabs">
      <button class="tab-btn active" onclick="setAction('comparison',this)">Comparison</button>
      <button class="tab-btn" onclick="setAction('conversion',this)">Conversion</button>
      <button class="tab-btn" onclick="setAction('arithmetic',this)">Arithmetic</button>
    </div>

    <!-- ARITHMETIC OPERATOR (only visible for arithmetic) -->
    <div class="arith-op" id="arith-ops">
      <span style="font-size:.8rem;font-weight:600;color:var(--muted);margin-right:4px;">Operation:</span>
      <button class="op-btn active" data-op="+" onclick="setOp('+',this)">+</button>
      <button class="op-btn" data-op="-" onclick="setOp('-',this)">−</button>
      <button class="op-btn" data-op="*" onclick="setOp('×',this)">×</button>
      <button class="op-btn" data-op="/" onclick="setOp('/',this)">÷</button>
    </div>

    <!-- INPUTS -->
    <div class="inputs-row">
      <div class="input-group">
        <label>From</label>
        <input type="number" id="val1" value="1" min="0" step="any"/>
        <select id="unit1"></select>
      </div>
      <div class="input-group" id="to-group">
        <label>To</label>
        <input type="number" id="val2" value="1000" min="0" step="any"/>
        <select id="unit2"></select>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">Calculate ↗</button>

    <!-- RESULT -->
    <div id="result-box">
      <div id="result-text"></div>
    </div>

  </div>
</main>
<script src="../js/home.js"></script>

</body>
</html>
